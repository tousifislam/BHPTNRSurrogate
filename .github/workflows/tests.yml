name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-tests:
    name: Fast tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run fast tests
        run: pytest -v -m "not slow and not gwsurrogate"

  slow-tests:
    name: Slow tests (Python 3.11)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-slow-tests')
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache h5 data
        uses: actions/cache@v4
        with:
          path: data
          key: surrogate-h5-data-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,gpr]"

      - name: Run slow tests
        run: pytest -v --run-slow -m "slow"

  gwsurrogate-tests:
    name: gwsurrogate comparison (Python 3.11)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-gwsurrogate-tests')
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install gwsurrogate

      - name: Locate gwsurrogate download dir
        id: gwsur-dir
        run: echo "path=$(python -c 'import os, gwsurrogate; print(os.path.join(os.path.dirname(gwsurrogate.__file__), "surrogate_downloads"))')" >> "$GITHUB_OUTPUT"

      - name: Cache h5 data
        uses: actions/cache@v4
        with:
          path: |
            data
            ${{ steps.gwsur-dir.outputs.path }}
          key: gwsurrogate-h5-data-v1

      - name: Run gwsurrogate comparison tests
        run: pytest -v --run-gwsurrogate -m "gwsurrogate"
